<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskMail — Smart Task Emailer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181b25;
    --surface2: #1e2230;
    --border: #2a2f42;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --accent-glow: rgba(108,99,255,0.18);
    --text: #e8eaf0;
    --muted: #7b82a0;
    --danger: #f87171;
    --success: #34d399;
    --warn: #fbbf24;
    --low: #60a5fa;
    --high: #f87171;
    --med: #fbbf24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }

  .logo {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent2); }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    margin-left: auto;
    font-style: italic;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 0;
    flex: 1;
    min-height: 0;
  }

  /* LEFT PANEL */
  .left {
    padding: 28px 32px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow-y: auto;
  }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 10px;
  }

  /* Add task form */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .form-row { display: flex; gap: 10px; }

  input[type=text], select, input[type=date], textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 9px;
    padding: 10px 13px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type=text]:focus, select:focus, input[type=date]:focus, textarea:focus {
    border-color: var(--accent);
  }
  input[type=text] { flex: 1; }
  select { min-width: 110px; }
  input[type=date] { min-width: 140px; color-scheme: dark; }
  textarea { width: 100%; resize: vertical; min-height: 60px; }

  select option { background: var(--surface2); }

  .btn {
    padding: 10px 20px;
    border-radius: 9px;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #7b73ff; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-danger { background: rgba(248,113,113,0.12); color: var(--danger); border: 1px solid rgba(248,113,113,0.25); }
  .btn-danger:hover { background: rgba(248,113,113,0.22); }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* Task list */
  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.2s, transform 0.15s;
    cursor: default;
  }
  .task-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .task-card.done { opacity: 0.5; }
  .task-card.done .task-title { text-decoration: line-through; }

  .task-check {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    appearance: none;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .task-check:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .task-check:checked::after {
    content: '✓';
    color: white;
    font-size: 11px;
    line-height: 1;
  }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 14px; font-weight: 500; margin-bottom: 5px; }
  .task-desc { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }

  .task-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .badge {
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
  }
  .badge-high { background: rgba(248,113,113,0.15); color: var(--high); }
  .badge-med { background: rgba(251,191,36,0.15); color: var(--med); }
  .badge-low { background: rgba(96,165,250,0.15); color: var(--low); }

  .badge-cat {
    background: var(--accent-glow);
    color: var(--accent2);
    border: 1px solid rgba(108,99,255,0.25);
  }

  .due-date {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .due-date.overdue { color: var(--danger); }

  .task-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    border-radius: 5px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .task-del:hover { color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
    font-size: 14px;
  }

  /* RIGHT PANEL */
  .right {
    padding: 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    background: var(--surface);
  }

  .email-config {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .email-config label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 3px;
    display: block;
  }

  .email-config input, .email-config select {
    width: 100%;
  }

  .generate-area {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .email-preview {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    min-height: 200px;
    white-space: pre-wrap;
    font-family: 'DM Mono', monospace;
    max-height: 380px;
    overflow-y: auto;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
  }
  .dot.loading { background: var(--warn); animation: pulse 1s infinite; }
  .dot.done { background: var(--success); }
  .dot.error { background: var(--danger); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .btn-send {
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    color: #fff;
    padding: 13px;
    border-radius: 11px;
    border: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.3px;
  }
  .btn-send:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(108,99,255,0.35); }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 600; color: var(--accent2); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; }
    .right { border-top: 1px solid var(--border); }
    .form-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Task<span>Mail</span></div>
  <div class="tagline">Manage tasks · AI drafts your update · One-click send</div>
</header>

<div class="main">
  <!-- LEFT: Task Manager -->
  <div class="left">
    <div>
      <div class="section-title">Add New Task</div>
      <div class="add-form">
        <div class="form-row">
          <input type="text" id="taskTitle" placeholder="Task title…">
          <select id="taskPriority">
            <option value="high">🔴 High</option>
            <option value="med" selected>🟡 Medium</option>
            <option value="low">🔵 Low</option>
          </select>
        </div>
        <div class="form-row">
          <select id="taskCategory">
            <option value="Work">💼 Work</option>
            <option value="Personal">🏠 Personal</option>
            <option value="Finance">💰 Finance</option>
            <option value="Health">❤️ Health</option>
            <option value="Other">📌 Other</option>
          </select>
          <input type="date" id="taskDue">
          <button class="btn btn-primary" onclick="addTask()">+ Add</button>
        </div>
        <textarea id="taskDesc" placeholder="Description (optional)…" rows="2"></textarea>
      </div>
    </div>

    <div>
      <div class="section-title">My Tasks</div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" data-filter="active" onclick="setFilter('active',this)">Active</button>
        <button class="filter-btn" data-filter="done" onclick="setFilter('done',this)">Done</button>
        <button class="filter-btn" data-filter="high" onclick="setFilter('high',this)">🔴 High</button>
        <button class="filter-btn" data-filter="overdue" onclick="setFilter('overdue',this)">⚠️ Overdue</button>
      </div>
    </div>

    <div class="task-list" id="taskList"></div>
  </div>

  <!-- RIGHT: Email Panel -->
  <div class="right">
    <div>
      <div class="section-title">Task Summary</div>
      <div class="stats-row" id="statsRow">
        <div class="stat-box"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total</div></div>
        <div class="stat-box"><div class="stat-num" id="statActive">0</div><div class="stat-label">Active</div></div>
        <div class="stat-box"><div class="stat-num" id="statDone">0</div><div class="stat-label">Done</div></div>
      </div>
    </div>

    <div>
      <div class="section-title">Email Configuration</div>
      <div class="email-config">
        <div>
          <label>Your Email Address</label>
          <input type="text" id="emailTo" placeholder="you@example.com">
        </div>
        <div>
          <label>Email Tone</label>
          <select id="emailTone">
            <option value="professional">Professional</option>
            <option value="concise">Concise & Bullet-pointed</option>
            <option value="casual">Casual & Friendly</option>
            <option value="executive">Executive Summary</option>
          </select>
        </div>
        <div>
          <label>Include Tasks</label>
          <select id="emailScope">
            <option value="all">All tasks</option>
            <option value="active">Active only</option>
            <option value="high">High priority only</option>
            <option value="overdue">Overdue only</option>
          </select>
        </div>
      </div>
    </div>

    <div class="generate-area">
      <div class="section-title">AI-Generated Email</div>
      <div class="status-bar">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Click Generate to create your email</span>
      </div>
      <div class="email-preview" id="emailPreview">Your email will appear here…</div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" onclick="generateEmail()" id="genBtn">⚡ Generate with AI</button>
        <button class="btn btn-ghost" onclick="copyEmail()">📋 Copy</button>
      </div>
      <button class="btn-send" id="sendBtn" onclick="sendEmail()" disabled>📨 Open in Mail App</button>
    </div>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskmail_tasks') || '[]');
  let currentFilter = 'all';
  let generatedSubject = '';
  let generatedBody = '';

  // ── Sample tasks on first load ──
  if (tasks.length === 0) {
    tasks = [
      { id: 1, title: 'Prepare monthly HR report', desc: 'Compile staffing data from SAP export', priority: 'high', category: 'Work', due: new Date(Date.now()+2*86400000).toISOString().split('T')[0], done: false },
      { id: 2, title: 'Review Azeriqaz org chart', desc: 'Update structure after recent changes', priority: 'med', category: 'Work', due: new Date(Date.now()+5*86400000).toISOString().split('T')[0], done: false },
      { id: 3, title: 'Check portfolio performance', desc: 'TSMC, Micron, AMD positions', priority: 'low', category: 'Finance', due: '', done: true },
    ];
    save();
  }

  function save() {
    localStorage.setItem('taskmail_tasks', JSON.stringify(tasks));
    render();
    updateStats();
  }

  function addTask() {
    const title = document.getElementById('taskTitle').value.trim();
    if (!title) { document.getElementById('taskTitle').focus(); return; }
    tasks.unshift({
      id: Date.now(),
      title,
      desc: document.getElementById('taskDesc').value.trim(),
      priority: document.getElementById('taskPriority').value,
      category: document.getElementById('taskCategory').value,
      due: document.getElementById('taskDue').value,
      done: false
    });
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskDesc').value = '';
    document.getElementById('taskDue').value = '';
    save();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); }
  }

  function isOverdue(t) {
    return t.due && !t.done && new Date(t.due) < new Date(new Date().toDateString());
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function filteredTasks() {
    return tasks.filter(t => {
      if (currentFilter === 'all') return true;
      if (currentFilter === 'active') return !t.done;
      if (currentFilter === 'done') return t.done;
      if (currentFilter === 'high') return t.priority === 'high' && !t.done;
      if (currentFilter === 'overdue') return isOverdue(t);
      return true;
    });
  }

  function render() {
    const list = document.getElementById('taskList');
    const ft = filteredTasks();
    if (ft.length === 0) {
      list.innerHTML = '<div class="empty-state">No tasks here yet.<br>Add one above ↑</div>';
      return;
    }
    list.innerHTML = ft.map(t => {
      const over = isOverdue(t);
      const dueStr = t.due ? `<span class="due-date${over?' overdue':''}">📅 ${t.due}${over?' ⚠️':''}</span>` : '';
      return `<div class="task-card${t.done?' done':''}">
        <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask(${t.id})">
        <div class="task-body">
          <div class="task-title">${t.title}</div>
          ${t.desc ? `<div class="task-desc">${t.desc}</div>` : ''}
          <div class="task-meta">
            <span class="badge badge-${t.priority}">${t.priority.toUpperCase()}</span>
            <span class="badge badge-cat">${t.category}</span>
            ${dueStr}
          </div>
        </div>
        <button class="task-del" onclick="deleteTask(${t.id})">×</button>
      </div>`;
    }).join('');
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = tasks.length;
    document.getElementById('statActive').textContent = tasks.filter(t=>!t.done).length;
    document.getElementById('statDone').textContent = tasks.filter(t=>t.done).length;
  }

  async function generateEmail() {
    const scope = document.getElementById('emailScope').value;
    const tone = document.getElementById('emailTone').value;

    let scopedTasks = tasks;
    if (scope === 'active') scopedTasks = tasks.filter(t => !t.done);
    else if (scope === 'high') scopedTasks = tasks.filter(t => t.priority === 'high' && !t.done);
    else if (scope === 'overdue') scopedTasks = tasks.filter(t => isOverdue(t));

    if (scopedTasks.length === 0) {
      setStatus('error', 'No tasks match the selected scope.');
      return;
    }

    const taskData = scopedTasks.map(t =>
      `- [${t.done?'DONE':'TODO'}] [${t.priority.toUpperCase()}] [${t.category}] ${t.title}${t.desc?' — '+t.desc:''}${t.due?' (due: '+t.due+')':''}${isOverdue(t)?' ⚠️ OVERDUE':''}`
    ).join('\n');

    const prompt = `You are an assistant helping someone send a task update email to themselves or their team. Write an email in a ${tone} tone based on these tasks:

${taskData}

Today's date: ${new Date().toDateString()}

Write:
1. A short subject line (prefix with "Subject: ")
2. A blank line
3. The email body

Be clear, helpful, and appropriately concise. Highlight overdue items if any. End with a professional closing.`;

    setStatus('loading', 'AI is drafting your email…');
    document.getElementById('genBtn').disabled = true;
    document.getElementById('emailPreview').textContent = '✍️ Writing…';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      const text = data.content?.map(c=>c.text||'').join('') || '';

      // Parse subject and body
      const lines = text.split('\n');
      const subjectLine = lines.find(l => l.toLowerCase().startsWith('subject:'));
      generatedSubject = subjectLine ? subjectLine.replace(/^subject:\s*/i,'').trim() : 'My Task Update';
      const bodyStart = lines.indexOf(subjectLine) + 1;
      generatedBody = lines.slice(bodyStart).join('\n').trim();

      document.getElementById('emailPreview').textContent = `Subject: ${generatedSubject}\n\n${generatedBody}`;
      document.getElementById('sendBtn').disabled = false;
      setStatus('done', 'Email ready — review and send!');
    } catch(e) {
      setStatus('error', 'Generation failed. Check your connection.');
      document.getElementById('emailPreview').textContent = 'Error generating email. Please try again.';
    }
    document.getElementById('genBtn').disabled = false;
  }

  function setStatus(type, msg) {
    const dot = document.getElementById('statusDot');
    dot.className = 'dot' + (type !== 'idle' ? ' '+type : '');
    document.getElementById('statusText').textContent = msg;
  }

  function copyEmail() {
    const preview = document.getElementById('emailPreview').textContent;
    navigator.clipboard.writeText(preview).then(() => {
      setStatus('done', 'Copied to clipboard!');
    });
  }

  function sendEmail() {
    const to = document.getElementById('emailTo').value.trim();
    if (!to) { alert('Please enter your email address in the Email Configuration section.'); return; }
    if (!generatedBody) { alert('Please generate an email first.'); return; }
    const mailto = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(generatedSubject)}&body=${encodeURIComponent(generatedBody)}`;
    window.open(mailto, '_blank');
  }

  // Enter key to add task
  document.getElementById('taskTitle').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // Init
  render();
  updateStats();
</script>
</body>
</html>
